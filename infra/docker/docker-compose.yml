version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: stockpro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-stockuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockpass}
      POSTGRES_DB:       ${POSTGRES_DB:-stockpro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U stockuser -d stockpro"]
      interval: 10s; timeout: 5s; retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stockpro_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s; timeout: 5s; retries: 5

  # ── Flask Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: stockpro_backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      FLASK_ENV:        production
      DATABASE_URL:     postgresql://stockuser:stockpass@db:5432/stockpro
      REDIS_URL:        redis://redis:6379/0
      CELERY_BROKER_URL:redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:    {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ../ml_engine/registry:/app/ml_engine/registry
    command: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:8000 wsgi:app

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: stockpro_celery
    restart: unless-stopped
    env_file: ../.env
    environment:
      FLASK_ENV:        production
      DATABASE_URL:     postgresql://stockuser:stockpass@db:5432/stockpro
      REDIS_URL:        redis://redis:6379/0
      CELERY_BROKER_URL:redis://redis:6379/1
    depends_on:
      - backend
    command: celery -A wsgi.celery worker -l info -c 4 --pool=eventlet

  # ── Celery Beat (scheduler) ───────────────────────────────────────────────
  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: stockpro_beat
    restart: unless-stopped
    env_file: ../.env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://stockuser:stockpass@db:5432/stockpro
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - celery_worker
    command: celery -A wsgi.celery beat -l info --scheduler redbeat.RedBeatScheduler

  # ── Flower (Celery monitor) ───────────────────────────────────────────────
  flower:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: stockpro_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - celery_worker
    command: celery -A wsgi.celery flower --port=5555

  # ── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: stockpro_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL:  ws://localhost:8000

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: stockpro_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: stockpro_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: stockpro_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # ── pgAdmin ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stockpro_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@stockpro.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  pgadmin_data:
